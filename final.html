<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Schüler-Terminal | Algorithmen-Workshop</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 25px; border-radius: 12px; shadow: 0 4px 15px rgba(0,0,0,0.1); }
        #setup-screen { text-align: center; padding: 40px 0; }
        .market-info { display: flex; justify-content: space-around; background: #2c3e50; color: white; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .strategy-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .rule-card { border: 1px solid #ddd; padding: 12px; border-radius: 8px; background: #fafafa; }
        input[type="number"] { width: 45px; }
        canvas { background: #fff; border: 1px solid #eee; width: 100%; height: 180px; border-radius: 8px; }
        .buy { border-left: 5px solid #27ae60; }
        .sell { border-left: 5px solid #e74c3c; }
        .btn-start { background: #2ecc71; color: white; border: none; padding: 12px 30px; border-radius: 6px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div id="setup-screen">
        <h2>🚀 Algorithmen-Börse</h2>
        <input type="text" id="playerName" placeholder="Teamname eingeben...">
        <button class="btn-start" onclick="startTrading()">Verbinden</button>
    </div>

    <div id="trading-screen" style="display:none;">
        <div class="market-info">
            <div>Kurs: <strong id="price">...</strong> €</div>
            <div>Mein Depot: <strong id="total">1000.00</strong> €</div>
            <div>Team: <span id="player-label"></span></div>
        </div>

        <div class="strategy-grid">
            <div class="rule-card buy"><strong>📈 Trend-Kauf</strong><br>In <input type="number" id="t1" value="5"> Ticks um > <input type="number" id="p1" value="2"> % gestiegen? <input type="checkbox" id="e1"></div>
            <div class="rule-card sell"><strong>💰 Gewinn</strong><br>In <input type="number" id="t2" value="10"> Ticks um > <input type="number" id="p2" value="5"> % gestiegen? <input type="checkbox" id="e2"></div>
            <div class="rule-card buy"><strong>📉 Dip-Kauf</strong><br>In <input type="number" id="t3" value="8"> Ticks um > <input type="number" id="p3" value="3"> % gefallen? <input type="checkbox" id="e3"></div>
            <div class="rule-card sell"><strong>🛡️ Stop-Loss</strong><br>In <input type="number" id="t4" value="3"> Ticks um > <input type="number" id="p4" value="2"> % gefallen? <input type="checkbox" id="e4"></div>
        </div>
        <canvas id="chart"></canvas>
        <p style="text-align:center">Cash: <span id="cash">1000.00</span> € | Aktien: <span id="shares">0</span></p>
    </div>
</div>

<script>
    // --- KONFIGURATION ---
    const S_URL = 'https://tzatuzzwdvkayowffbxy.supabase.co';
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR6YXR1enp3ZHZrYXlvd2ZmYnh5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NTI1NDcsImV4cCI6MjA4ODEyODU0N30.cz5jRfhlOGs9OhFeIfdORPjDljcysI_6db3ny9fLRE4';
    
    // WICHTIG: Variable umbenannt in 'tradingDb', um Konflikt mit der Library zu vermeiden
    const tradingDb = supabase.createClient(S_URL, S_KEY);

    let price = 100, cash = 1000, shares = 0, history = [], playerName = "";

    async function startTrading() {
        playerName = document.getElementById('playerName').value.trim();
        if(!playerName) return alert("Bitte Namen eingeben!");
        
        document.getElementById('setup-screen').style.display = 'none';
        document.getElementById('trading-screen').style.display = 'block';
        document.getElementById('player-label').innerText = playerName;

        runLoop();
    }

    async function runLoop() {
        try {
            const { data } = await tradingDb.from('market').select('price').eq('id', 1).single();
            if (data) {
                price = data.price;
                history.push(price);
                if(history.length > 50) history.shift();

                checkRule(1, "BUY", true);  
                checkRule(2, "SELL", true); 
                checkRule(3, "BUY", false); 
                checkRule(4, "SELL", false);

                let totalValue = +(cash + shares * price).toFixed(2);
                await tradingDb.from('leaderboard').upsert({ name: playerName, score: totalValue });

                updateUI(totalValue);
            }
        } catch (e) { console.error("Verbindungsfehler:", e); }
        
        setTimeout(runLoop, 1500);
    }

    function checkRule(id, action, posDir) {
        if (!document.getElementById('e' + id).checked) return;
        let t = parseInt(document.getElementById('t' + id).value);
        let p = parseFloat(document.getElementById('p' + id).value) / 100;
        if (history.length > t) {
            let oldPrice = history[history.length - 1 - t];
            let change = (price - oldPrice) / oldPrice;
            if (posDir && change >= p) executeTrade(action);
            else if (!posDir && change <= -p) executeTrade(action);
        }
    }

    function executeTrade(action) {
        if (action === "BUY" && cash >= price) { cash -= price; shares++; }
        else if (action === "SELL" && shares > 0) { cash += price; shares--; }
    }

    function updateUI(total) {
        document.getElementById('price').innerText = price.toFixed(2);
        document.getElementById('cash').innerText = cash.toFixed(2);
        document.getElementById('shares').innerText = shares;
        document.getElementById('total').innerText = total.toFixed(2);
        drawChart();
    }

    function drawChart() {
        const canvas = document.getElementById('chart'), ctx = canvas.getContext('2d');
        ctx.clearRect(0,0,canvas.width, canvas.height);
        ctx.strokeStyle = "#3498db"; ctx.lineWidth = 2; ctx.beginPath();
        if(history.length < 2) return;
        const minP = Math.min(...history) * 0.99, maxP = Math.max(...history) * 1.01;
        history.forEach((p, i) => {
            let x = (i / (history.length-1)) * canvas.width;
            let y = canvas.height - ((p - minP) / (maxP - minP)) * canvas.height;
            i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        });
        ctx.stroke();
    }
</script>
</body>
</html>
