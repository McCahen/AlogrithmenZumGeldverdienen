<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>🏆 Live-Ranking | Börsen-Workshop</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Spezifische Anpassungen nur für das Ranking-Display */
        h1 { text-align: center; color: #006b4d; margin-top: 40px; }
        table { 
            width: 100%; 
            max-width: 900px; 
            margin: 30px auto; 
            border-collapse: collapse; 
            font-size: 1.4em; /* Größer für den Beamer */
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        th { background: #006b4d; color: white; padding: 20px; text-align: left; }
        td { padding: 15px 20px; border-bottom: 1px solid #eee; }
        tr:nth-child(even) { background: #f9f9f9; }
        tr:first-child { font-weight: bold; font-size: 1.2em; color: #b59410; } /* Platz 1 Gold */
        .score-val { font-family: monospace; text-align: right; }
    </style>
</head>
<body>
    <header>
        <div class="logo-container">
            <a href="home.html">
                <img src="HSG_Logo_DE_RGB.png" alt="HSG Logo">
            </a>
        </div>
        <nav>
            <a href="home.html">Home</a>
            <a href="challenge.html">Challenge</a>
        </nav>
    </header>

    <div class="container">
        <h1>🏆 Live-Ranking</h1>
        <table>
            <thead>
                <tr>
                    <th>Rang</th>
                    <th>Team</th>
                    <th style="text-align: right;">Depotwert</th>
                </tr>
            </thead>
            <tbody id="leaderboardBody">
                </tbody>
        </table>
    </div>

    <script>
        const S_URL = 'https://tzatuzzwdvkayowffbxy.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR6YXR1enp3ZHZrYXlvd2ZmYnh5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NTI1NDcsImV4cCI6MjA4ODEyODU0N30.cz5jRfhlOGs9OhFeIfdORPjDljcysI_6db3ny9fLRE4';
        const db = supabase.createClient(S_URL, S_KEY);

        async function updateLeaderboard() {
            const { data, error } = await db
                .from('leaderboard')
                .select('*')
                .order('score', { ascending: false })
                .limit(10); // Top 10 anzeigen
        
            if (error) return;
        
            const list = document.getElementById('leaderboardBody');
            list.innerHTML = "";
        
            data.forEach((entry, index) => {
                const row = document.createElement('tr');
                
                // Rang bestimmen (index startet bei 0, also +1)
                const rank = index + 1;
        
                // CSS Klasse basierend auf Rang hinzufügen
                if (rank === 1) row.className = "rank-1";
                else if (rank === 2) row.className = "rank-2";
                else if (rank === 3) row.className = "rank-3";
        
                row.innerHTML = `
                    <td>${rank}</td>
                    <td>${entry.name}</td>
                    <td>${entry.score.toFixed(2)} CHF</td>
                `;
                list.appendChild(row);
            });
        }

        // Initialer Aufruf und Intervall
        updateLeaderboard();
        setInterval(updateLeaderboard, 1000);
    </script>
</body>
</html>
