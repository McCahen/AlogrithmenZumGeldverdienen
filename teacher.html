<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Lehrer-Dashboard | Profi-Modus</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="logo-container">
        <img src="HSG_Logo_DE_RGB.png" alt="HSG Logo">
    </div>
    <nav><span style="font-weight: bold; color: #00802f;">Markt-Zentrale</span></nav>
</header>

<div class="container">
    <div id="setup-screen" class="setup-container">
        <div class="card">
            <h2>🚀 Simulation starten</h2>
            <input type="text" id="roomInput" placeholder="Raum-Code (z.B. HSG-2024)">
            <button onclick="createAndJoinRoom()" class="btn-start btn-block">Raum öffnen</button>
        </div>
    </div>

    <div id="admin-ui" style="display: none;">
        <div class="card">
            <div class="status-bar">
                <span id="status-dot" class="status-dot waiting"></span>
                <span id="status-text">Simulation bereit</span>
                <span class="room-display" id="active-room-display" style="margin-left: auto;">-</span>
            </div>

            <canvas id="chart"></canvas>

            <div class="market-info">
                <span>Kurs: <strong id="current-price">100.00</strong> CHF</span>
                <span id="trend-label">Trend: Neutral</span>
            </div>

            <div class="strategy-grid">
                <div class="rule-card">
                    <h4>Volatilität (Schwankung)</h4>
                    <div style="font-size: 1.5em; font-weight: bold; margin: 10px 0; color: #006b4d;">
                        <span id="vola-display">1.2</span>%
                    </div>
                    <div style="display: flex; gap: 5px;">
                        <button onclick="adjustVola(-0.001)" class="btn-start" style="flex:1; padding: 10px; min-width: 0;">-</button>
                        <button onclick="adjustVola(0.001)" class="btn-start" style="flex:1; padding: 10px; min-width: 0;">+</button>
                    </div>
                </div>

                <div class="rule-card">
                    <h4>Markt-Trend</h4>
                    <button onclick="setTrend(0.006, 'Bull-Market')" class="btn-start btn-block" style="background:#10b981; margin-bottom:5px; font-size: 0.8em;">📈 Bull</button>
                    <button onclick="setTrend(-0.006, 'Bear-Market')" class="btn-start btn-block" style="background:#ef4444; margin-bottom:5px; font-size: 0.8em;">📉 Bear</button>
                    <button onclick="setTrend(0, 'Neutral')" class="btn-start btn-block" style="background:#64748b; font-size: 0.8em;">⚖️ Reset</button>
                </div>

                <div class="rule-card">
                    <h4>Direkt-Eingriff</h4>
                    <button onclick="triggerShock(1.10)" class="btn-start btn-block" style="background:#0ea5e9; margin-bottom:5px; font-size: 0.8em;">⚡ +10%</button>
                    <button onclick="triggerShock(0.90)" class="btn-start btn-block" style="background:#6366f1; margin-bottom:5px; font-size: 0.8em;">💥 -10%</button>
                    <button onclick="resetPrice()" class="btn-start btn-block" style="background:#000; font-size: 0.8em;">🔄 Reset 100.-</button>
                </div>
            </div>

            <div style="margin-top: 30px; display: flex; flex-direction: column; gap: 10px;">
                <button id="playPauseBtn" onclick="toggleSimulation()" class="btn-start btn-block" style="background: #00802f; height: 60px; font-size: 1.3em;">
                    ▶️ Simulation Starten
                </button>
                <button id="toggleBtn" onclick="toggleChallenge()" class="btn-start btn-block" style="background:#f59e0b;">
                    🔓 Challenge für Schüler freigeben
                </button>
            </div>

            <div class="rule-card" style="margin-top: 20px;">
                <h4>🏆 Live-Ranking (Top 3)</h4>
                <div id="leaderboard-list">Noch keine Daten...</div>
            </div>
        </div>
    </div>
</div>

<script>
    const S_URL = 'https://tzatuzzwdvkayowffbxy.supabase.co';
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR6YXR1enp3ZHZrYXlvd2ZmYnh5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NTI1NDcsImV4cCI6MjA4ODEyODU0N30.cz5jRfhlOGs9OhFeIfdORPjDljcysI_6db3ny9fLRE4'; // <--- DEINEN KEY HIER EINSETZEN
    const tradingDb = supabase.createClient(S_URL, S_KEY);

    let currentRoom = "", price = 100, isChallengeActive = false, isSimRunning = false;
    let currentTrend = 0, currentVola = 0.012; 
    let priceHistory = [100], timeLabels = [0], chart;

    function initChart() {
        const ctx = document.getElementById('chart').getContext('2d');
        chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: timeLabels,
                datasets: [{
                    label: 'Marktpreis',
                    data: priceHistory,
                    borderColor: '#00802f',
                    borderWidth: 3,
                    tension: 0.3,
                    pointRadius: 0,
                    fill: true,
                    backgroundColor: 'rgba(0, 128, 47, 0.05)'
                }]
            },
            options: { responsive: true, animation: false, scales: { y: { ticks: { callback: v => v + '.-' } } } }
        });
    }

    async function createAndJoinRoom() {
        const name = document.getElementById('roomInput').value.trim().toUpperCase();
        if(!name) return alert("Code eingeben!");
        const { error } = await tradingDb.from('market').upsert([{ room_id: name, price: 100, challenge_active: false }], { onConflict: 'room_id' });
        if(error) return alert(error.message);

        currentRoom = name;
        document.getElementById('setup-screen').style.display = 'none';
        document.getElementById('admin-ui').style.display = 'block';
        document.getElementById('active-room-display').innerText = name;
        initChart();
        setInterval(updateLeaderboard, 2500);
    }

    function adjustVola(delta) {
        currentVola = Math.max(0.001, currentVola + delta);
        document.getElementById('vola-display').innerText = (currentVola * 100).toFixed(1);
    }

    function setTrend(val, label) {
        currentTrend = val;
        document.getElementById('trend-label').innerText = "Trend: " + label;
    }

    function triggerShock(factor) {
        price = +(price * factor).toFixed(2);
        updateDBAndUI();
    }

    function resetPrice() {
        price = 100;
        priceHistory = [100];
        timeLabels = [0];
        updateDBAndUI();
    }

    function toggleSimulation() {
        isSimRunning = !isSimRunning;
        const btn = document.getElementById('playPauseBtn');
        if(isSimRunning) {
            btn.innerText = "⏸️ Simulation Pausieren";
            btn.style.background = "#64748b";
            runLoop();
        } else {
            btn.innerText = "▶️ Simulation Fortsetzen";
            btn.style.background = "#00802f";
        }
    }

    async function runLoop() {
        if (!isSimRunning || !currentRoom) return;
        let change = price * ((Math.random() - 0.5) * currentVola + currentTrend);
        price = +(price + change).toFixed(2);
        if (price < 5) price = 5;
        updateDBAndUI();
        setTimeout(runLoop, 800);
    }

    async function updateDBAndUI() {
        await tradingDb.from('market').update({ price: price }).eq('room_id', currentRoom);
        document.getElementById('current-price').innerText = price.toFixed(2);
        priceHistory.push(price);
        timeLabels.push(timeLabels.length);
        if(priceHistory.length > 40) { priceHistory.shift(); timeLabels.shift(); }
        chart.update();
    }

    async function toggleChallenge() {
        isChallengeActive = !isChallengeActive;
        const btn = document.getElementById('toggleBtn');
        await tradingDb.from('market').update({ challenge_active: isChallengeActive }).eq('room_id', currentRoom);
        btn.innerText = isChallengeActive ? "🔒 Challenge sperren" : "🔓 Challenge freigeben";
        btn.style.background = isChallengeActive ? "#64748b" : "#f59e0b";
        document.getElementById('status-dot').className = isChallengeActive ? "status-dot online" : "status-dot waiting";
    }

    async function updateLeaderboard() {
        if(!currentRoom) return;
        const { data } = await tradingDb.from('leaderboard').select('name, score').eq('room_id', currentRoom).order('score', { ascending: false }).limit(3);
        if (data) {
            document.getElementById('leaderboard-list').innerHTML = data.map((s, i) => 
                `<div class="input-group"><span>${i+1}. ${s.name}</span><strong>${Math.round(s.score)}.-</strong></div>`).join('');
        }
    }
</script>
</body>
</html>
