<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>🕹️ Markt-Konsole</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; padding: 30px; text-align: center; }
        .panel { max-width: 500px; margin: auto; background: #262626; padding: 20px; border-radius: 15px; border: 2px solid #444; }
        .price { font-size: 4em; color: #2ecc71; margin: 20px 0; font-family: monospace; }
        .controls button { width: 100%; padding: 15px; margin: 10px 0; cursor: pointer; font-weight: bold; border-radius: 8px; border: none; font-size: 1.1em; }
        .btn-start { background: #27ae60; color: white; }
        .btn-stop { background: #e67e22; color: white; }
        .btn-trend { background: #34495e; color: white; border: 1px solid #555; }
        .active-trend { border: 3px solid #38bdf8 !important; box-shadow: 0 0 10px #38bdf8; }
        .status { color: #94a3b8; font-style: italic; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="panel">
    <h2>Markt-Steuerung</h2>
    <div id="status-label" class="status">Markt ist: ANGEHALTEN</div>
    
    <button id="mainBtn" class="btn-start" onclick="toggleMarket()">▶️ Markt STARTEN</button>
    
    <div class="price" id="priceDisplay">100.00 €</div>

    <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px;">
        <button id="btn-bull" class="btn-trend" onclick="setTrend('bull')">🚀 Bull</button>
        <button id="btn-sideways" class="btn-trend active-trend" onclick="setTrend('sideways')">↔️ Neutral</button>
        <button id="btn-bear" class="btn-trend" onclick="setTrend('bear')">📉 Bear</button>
    </div>

    <button style="background: #c0392b; color: white; margin-top: 30px;" onclick="reset()">♻️ Reset Leaderboard</button>
</div>

<script>
    // --- KONFIGURATION (Bitte ausfüllen) ---
    const S_URL = 'https://tzatuzzwdvkayowffbxy.supabase.co';
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR6YXR1enp3ZHZrYXlvd2ZmYnh5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NTI1NDcsImV4cCI6MjA4ODEyODU0N30.cz5jRfhlOGs9OhFeIfdORPjDljcysI_6db3ny9fLRE4';
    const db = supabase.createClient(S_URL, S_KEY);

    let price = 100, trend = 'sideways', isRunning = false, interval = null;

    function toggleMarket() {
        isRunning = !isRunning;
        const btn = document.getElementById('mainBtn');
        const status = document.getElementById('status-label');

        if (isRunning) {
            btn.innerText = "⏸️ Markt STOPPEN";
            btn.className = "btn-stop";
            status.innerText = "Markt ist: AKTIV";
            interval = setInterval(tick, 1500);
        } else {
            btn.innerText = "▶️ Markt STARTEN";
            btn.className = "btn-start";
            status.innerText = "Markt ist: ANGEHALTEN";
            clearInterval(interval);
        }
    }

    async function tick() {
        let change = (Math.random() - 0.5) * 1.5;
        if (trend === 'bull') change += 1.4;
        if (trend === 'bear') change -= 1.6;

        price = Math.max(2, +(price + change).toFixed(2));
        document.getElementById('priceDisplay').innerText = price.toFixed(2) + " €";

        await db.from('market').update({ price: price }).eq('id', 1);
    }

    function setTrend(t) {
        trend = t;
        document.querySelectorAll('.btn-trend').forEach(b => b.classList.remove('active-trend'));
        document.getElementById('btn-' + t).classList.add('active-trend');
    }

    async function reset() {
        if(confirm("Alle Schüler-Daten löschen?")) {
            await db.from('leaderboard').delete().neq('name', '---');
            location.reload();
        }
    }
</script>
</body>
</html>
