<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Lehrer-Dashboard | Marktsteuerung</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="logo-container">
        <img src="HSG_Logo_DE_RGB.png" alt="HSG Logo">
    </div>
    <nav>
        <span style="font-weight: bold; color: #00802f;">Admin-Konsole</span>
    </nav>
</header>

<div class="container">
    <div id="setup-screen" class="setup-container">
        <div class="card">
            <h2>👨‍🏫 Raum erstellen</h2>
            <p>Gib einen Code für deine Klasse ein:</p>
            <input type="text" id="roomInput" placeholder="z.B. KLASSE-4B">
            <button onclick="createAndJoinRoom()" class="btn-start btn-block">Simulation starten</button>
        </div>
    </div>

    <div id="admin-ui" style="display: none;">
        <div class="setup-container" style="max-width: 600px;">
            <div class="card">
                <div class="status-bar">
                    <span id="status-dot" class="status-dot"></span>
                    <span id="status-text">Warte auf Freigabe</span>
                </div>
                
                <h3>Raum: <span id="active-room-display" class="room-display">-</span></h3>
                
                <div class="market-info" style="flex-direction: column; align-items: center; gap: 5px;">
                    <span style="font-size: 0.8em; color: #64748b;">Aktueller Kurs</span>
                    <strong id="current-price" style="font-size: 2.5em;">100.00</strong>
                    <small id="trend-label">Status: Seitwärts</small>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px;">
                    <button onclick="setTrend(0.008, 'Bull-Market')" class="btn-start" style="background:#10b981; min-width: 0; padding: 10px;">📈 Bull</button>
                    <button onclick="setTrend(-0.008, 'Bear-Market')" class="btn-start" style="background:#ef4444; min-width: 0; padding: 10px;">📉 Bear</button>
                    <button onclick="triggerShock(1.20)" class="btn-start" style="background:#0ea5e9; min-width: 0; padding: 10px;">⚡ +20%</button>
                    <button onclick="triggerShock(0.80)" class="btn-start" style="background:#6366f1; min-width: 0; padding: 10px;">💥 -20%</button>
                </div>
                
                <button onclick="setTrend(0, 'Seitwärts')" class="btn-start btn-block" style="background:#64748b; margin-top: 10px; padding: 8px;">⚖️ Neutralisieren</button>

                <div style="margin-top: 25px; border-top: 1px solid #eee; padding-top: 20px;">
                    <button id="toggleBtn" onclick="toggleChallenge()" class="btn-start btn-block" style="background:#f59e0b;">
                        🔓 Challenge für Schüler öffnen
                    </button>
                </div>

                <div style="margin-top: 30px; text-align: left;">
                    <h4 style="margin-bottom: 10px;">🏆 Top 5 (Live)</h4>
                    <div id="leaderboard-list" style="font-size: 0.9em;">
                        Warte auf Teilnehmer...
                    </div>
                </div>

                <button onclick="resetChallenge()" style="margin-top: 30px; background: none; border: none; color: #94a3b8; cursor: pointer; text-decoration: underline;">Simulation beenden</button>
            </div>
        </div>
    </div>
</div>

<script>
    const S_URL = 'https://tzatuzzwdvkayowffbxy.supabase.co';
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR6YXR1enp3ZHZrYXlvd2ZmYnh5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NTI1NDcsImV4cCI6MjA4ODEyODU0N30.cz5jRfhlOGs9OhFeIfdORPjDljcysI_6db3ny9fLRE4'; 
    const tradingDb = supabase.createClient(S_URL, S_KEY);

    let currentRoom = "", price = 100, isChallengeActive = false, currentTrend = 0;

    async function createAndJoinRoom() {
        const roomName = document.getElementById('roomInput').value.trim().toUpperCase();
        if (!roomName) return alert("Raum-Name fehlt!");

        const { error } = await tradingDb.from('market')
            .upsert([{ room_id: roomName, price: 100, challenge_active: false }], { onConflict: 'room_id' });

        if (error) return alert("DB Fehler: " + error.message);

        currentRoom = roomName;
        document.getElementById('setup-screen').style.display = 'none';
        document.getElementById('admin-ui').style.display = 'block';
        document.getElementById('active-room-display').innerText = roomName;
        
        startPriceLoop();
        setInterval(updateLeaderboard, 2000);
    }

    function setTrend(val, label) {
        currentTrend = val;
        document.getElementById('trend-label').innerText = "Status: " + label;
    }

    function triggerShock(factor) {
        price = +(price * factor).toFixed(2);
    }

    async function startPriceLoop() {
        if (!currentRoom) return;
        let vola = (Math.random() - 0.5) * 0.012; 
        price = +(price * (1 + vola + currentTrend)).toFixed(2);
        if (price < 5) price = 5;

        await tradingDb.from('market').update({ price: price }).eq('room_id', currentRoom);
        document.getElementById('current-price').innerText = price.toFixed(2);
        setTimeout(startPriceLoop, 800);
    }

    async function toggleChallenge() {
        isChallengeActive = !isChallengeActive;
        const btn = document.getElementById('toggleBtn');
        const dot = document.getElementById('status-dot');

        await tradingDb.from('market').update({ challenge_active: isChallengeActive }).eq('room_id', currentRoom);

        btn.innerText = isChallengeActive ? "🔒 Challenge sperren" : "🔓 Challenge öffnen";
        btn.style.background = isChallengeActive ? "#64748b" : "#f59e0b";
        dot.className = isChallengeActive ? "status-dot online" : "status-dot waiting";
        document.getElementById('status-text').innerText = isChallengeActive ? "Markt ist offen" : "Warte auf Freigabe";
    }

    async function updateLeaderboard() {
        const { data } = await tradingDb.from('leaderboard')
            .select('name, score').eq('room_id', currentRoom)
            .order('score', { ascending: false }).limit(5);

        if (data && data.length > 0) {
            document.getElementById('leaderboard-list').innerHTML = data.map((s, i) => 
                `<div style="display:flex; justify-content:space-between; padding: 5px 0; border-bottom: 1px solid #f8fafc;">
                    <span>${i+1}. ${s.name}</span><strong>${s.score.toFixed(2)}</strong>
                </div>`).join('');
        }
    }

    async function resetChallenge() {
        if (!confirm("Alle Teilnehmer kicken?")) return;
        await tradingDb.from('market').update({ price: -1, challenge_active: false }).eq('room_id', currentRoom);
        location.reload();
    }
</script>
</body>
</html>
