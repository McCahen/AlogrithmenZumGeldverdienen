<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>🕹️ Markt-Konsole Pro | Lehrer-Ansicht</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
</head>

    
<body>
    <header>
        <div class="logo-container">
            <a href="home.html">
                <img src="HSG_Logo_DE_RGB.png" alt="HSG Logo">
            </a>
        </div>
        
        <nav>
            <a href="statisch.html">Statisch</a>
            <a href="trend.html">Trend</a>
            <a href="konter-trend.html" class="active">Konter-Trend</a>
            <a href="kombiniert.html">Kombiniert</a>
        </nav>
    </header>
    <div class="header">
        <h1>Lehrpersonen Portal: Algorithmen zum Geldverdienen</h1>
    </div>

    <div class="console-card">
        <div id="statusInfo" class="status-text">Status: Angehalten</div>
        <div class="price-display" id="priceLabel">100.00</div>

        <button id="masterAction" class="main-btn btn-start" onclick="toggleMarket()">▶ Markt Starten</button>

        <div class="control-grid">
            <button id="btn-bull" class="trend-btn" onclick="setTrend('bull')">🚀 Bull</button>
            <button id="btn-sideways" class="trend-btn active" onclick="setTrend('sideways')">↔ Neutral</button>
            <button id="btn-bear" class="trend-btn" onclick="setTrend('bear')">📉 Bear</button>
            
            <button class="trend-btn spike-up" onclick="triggerSpike(5)">⚡ UP-SPIKE (+5%)</button>
            <div style="display:flex; align-items:center; justify-content:center; color:#64748b; font-size:0.8em;">Manuelle Sprünge</div>
            <button class="trend-btn spike-down" onclick="triggerSpike(-5)">💥 DOWN-SPIKE (-5%)</button>
        </div>

        <div class="vol-box">
            <div class="status-text">Markt-Volatilität (Grundrauschen)</div>
            <div class="vol-controls">
                <button class="vol-btn" onclick="adjustVol(-0.5)">-</button>
                <div class="vol-display"><span id="volLabel">1.5</span>%</div>
                <button class="vol-btn" onclick="adjustVol(0.5)">+</button>
            </div>
        </div>

        <div class="vol-box" style="margin-top: 20px; border-color: #f59e0b;">
            <div class="status-text" style="color: #f59e0b;">Challenge Modus</div>
            <div class="vol-controls">
                <button id="challengeToggleBtn" class="main-btn btn-start" 
                        style="background: #d97706; margin-bottom: 0;" 
                        onclick="toggleChallenge()">🔓 Challenge freischalten</button>
            </div>
        </div>

        <button class="reset-link" onclick="fullReset()">Leaderboard & Markt zurücksetzen</button>
    </div>

    <script>
        // --- INITIALISIERUNG ---
        const S_URL = 'https://tzatuzzwdvkayowffbxy.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR6YXR1enp3ZHZrYXlvd2ZmYnh5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NTI1NDcsImV4cCI6MjA4ODEyODU0N30.cz5jRfhlOGs9OhFeIfdORPjDljcysI_6db3ny9fLRE4';
        const db = supabase.createClient(S_URL, S_KEY);
        
        let currentPrice = 100.00;
        let activeTrend = 'sideways';
        let volatility = 1.5; // In Prozent
        let marketActive = false;
        let tickerId = null;

        let challengeActive = false;

        async function toggleChallenge() {
            challengeActive = !challengeActive;
            const btn = document.getElementById('challengeToggleBtn');
            
            // Update in der DB
            await db.from('market').update({ challenge_active: challengeActive }).eq('id', 1);
            
            if (challengeActive) {
                btn.innerText = "🔒 Challenge sperren";
                btn.style.background = "#ef4444";
            } else {
                btn.innerText = "🔓 Challenge freischalten";
                btn.style.background = "#d97706";
            }
        }
        
        function toggleMarket() {
            const btn = document.getElementById('masterAction');
            const status = document.getElementById('statusInfo');
            if (!marketActive) {
                marketActive = true;
                btn.innerText = "⏸ Markt Stoppen";
                btn.className = "main-btn btn-stop";
                status.innerText = "Status: Live (Prozentual)";
                status.style.color = "#22c55e";
                tickerId = setInterval(executeTick, 500);
            } else {
                stopMarket();
            }
        }

        function stopMarket() {
            marketActive = false;
            const btn = document.getElementById('masterAction');
            const status = document.getElementById('statusInfo');
            if(btn) { btn.innerText = "▶ Markt Starten"; btn.className = "main-btn btn-start"; }
            if(status) { status.innerText = "Status: Angehalten"; status.style.color = "#94a3b8"; }
            clearInterval(tickerId);
        }

        async function executeTick() {
            // Prozentuale Berechnung vom AKTUELLEN Preis
            let changePercent = (Math.random() - 0.5) * (volatility / 100);

            if (activeTrend === 'bull') changePercent += 0.015; // +1.5% Trend
            if (activeTrend === 'bear') changePercent -= 0.018; // -1.8% Trend

            let delta = currentPrice * changePercent;
            currentPrice = Math.max(0.5, +(currentPrice + delta).toFixed(2));
            
            updateDisplayAndDB();
        }

        async function triggerSpike(percent) {
            if (!marketActive) return alert("Starte erst den Markt!");
            let spikeDelta = currentPrice * (percent / 100);
            currentPrice = Math.max(0.5, +(currentPrice + spikeDelta).toFixed(2));
            updateDisplayAndDB();
        }

        function adjustVol(val) {
            volatility = Math.max(0.1, +(volatility + val).toFixed(1));
            document.getElementById('volLabel').innerText = volatility.toFixed(1);
        }

        async function updateDisplayAndDB() {
            document.getElementById('priceLabel').innerText = currentPrice.toFixed(2);
            await db.from('market').update({ price: currentPrice }).eq('id', 1);
        }

        function setTrend(t) {
            activeTrend = t;
            document.querySelectorAll('.trend-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + t).classList.add('active');
        }

        async function fullReset() {
            if (!confirm("Reset durchführen? (Preis auf -1 für Schüler-Reset)")) return;
            stopMarket();
            // Signal für Schüler-Reset senden
            await db.from('market').update({ price: -1 }).eq('id', 1);
            await db.from('leaderboard').delete().neq('name', '---');
            
            setTimeout(async () => {
                currentPrice = 100.00;
                await db.from('market').update({ price: 100.00 }).eq('id', 1);
                document.getElementById('priceLabel').innerText = "100.00";
            }, 2000);
        }
    </script>
</body>
</html>
