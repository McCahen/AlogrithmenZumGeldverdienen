<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Lehrer-Dashboard | HSG Trading</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="logo-container"><img src="HSG_Logo_DE_RGB.png" alt="HSG Logo"></div>
    <nav><span style="font-weight: bold; color: #00802f;">Markt-Leitstand</span></nav>
</header>

<div class="container">
    
    <div id="dashboard-grid" style="display: grid; grid-template-columns: 280px 1fr 280px; gap: 20px; align-items: start;">
        
        <aside class="card">
            <h3>⚙️ Setup & Status</h3>
            <div id="room-setup">
                <input type="text" id="roomInput" placeholder="Raum-Code" style="width: 100%; margin-bottom: 10px;">
                <button onclick="createAndJoinRoom()" class="btn-start btn-block">Raum öffnen</button>
            </div>

            <div id="active-controls" style="display:none; margin-top: 20px;">
                <div class="status-bar" style="margin-bottom: 15px;">
                    <span id="status-dot" class="status-dot waiting"></span>
                    <span id="status-text">Bereit</span>
                </div>
                
                <button id="playPauseBtn" onclick="toggleSimulation()" class="btn-start btn-block" style="background:#00802f; margin-bottom: 10px;">▶️ Start</button>
                <button id="toggleBtn" onclick="toggleChallenge()" class="btn-start btn-block" style="background:#f59e0b; margin-bottom: 10px;">🔓 Challenge öffnen</button>
                <button onclick="resetEverything()" class="btn-start btn-block" style="background:#000;">🔄 Reset (Alles)</button>
                
                <p style="text-align: center; font-size: 0.8em; color: #64748b; margin-top: 15px;">Raum: <strong id="active-room-display">-</strong></p>
            </div>
        </aside>

        <main class="card">
            <h3>📈 Marktverlauf</h3>
            <canvas id="chart" style="max-height: 300px;"></canvas>
            <div class="market-info" style="justify-content: center; gap: 40px; margin-top: 15px;">
                <div>Kurs: <strong id="current-price">100.00</strong></div>
                <div>Trend: <strong id="trend-label">Neutral</strong></div>
            </div>
        </main>

        <aside class="card">
            <h3>⚡ Interaktion</h3>
            
            <h4 style="font-size: 0.8em; color: #64748b;">Events</h4>
            <button onclick="triggerShock(1.05)" class="btn-start btn-block" style="background:#0ea5e9; margin-bottom: 10px;">🚀 Hype (+5%)</button>
            <button onclick="triggerShock(0.95)" class="btn-start btn-block" style="background:#6366f1; margin-bottom: 20px;">💥 Crash (-5%)</button>

            <h4 style="font-size: 0.8em; color: #64748b;">Markt-Phasen</h4>
            <button onclick="setTrend(0.007, 'Bull')" class="btn-start btn-block" style="background:#10b981; margin-bottom: 5px;">📈 Bull Market</button>
            <button onclick="setTrend(0, 'Neutral')" class="btn-start btn-block" style="background:#64748b; margin-bottom: 5px;">⚖️ Neutral</button>
            <button onclick="setTrend(-0.007, 'Bear')" class="btn-start btn-block" style="background:#ef4444;">📉 Bear Market</button>

            <div style="margin-top: 20px; padding-top: 10px; border-top: 1px solid #eee;">
                <h4 style="font-size: 0.8em; color: #64748b;">Vola: <span id="vola-display">1.2</span>%</h4>
                <div style="display: flex; gap: 5px;">
                    <button onclick="adjustVola(0.001)" class="btn-start" style="flex:1">+</button>
                    <button onclick="adjustVola(-0.001)" class="btn-start" style="flex:1">-</button>
                </div>
            </div>
        </aside>

    </div>
</div>

<script>
    const S_URL = 'https://tzatuzzwdvkayowffbxy.supabase.co';
    const S_KEY = 'DEIN_KEY_HIER'; 
    const tradingDb = supabase.createClient(S_URL, S_KEY);

    let currentRoom = "", price = 100, isSimRunning = false, isChallengeActive = false;
    let currentTrend = 0, currentVola = 0.012, priceHistory = [100], timeLabels = [0], chart;

    function initChart() {
        const ctx = document.getElementById('chart').getContext('2d');
        chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: timeLabels,
                datasets: [{ label: 'Preis', data: priceHistory, borderColor: '#00802f', borderWidth: 2, tension: 0.3, pointRadius: 0, fill: false }]
            },
            options: { responsive: true, animation: false }
        });
    }

    async function createAndJoinRoom() {
        const name = document.getElementById('roomInput').value.trim().toUpperCase();
        if(!name) return alert("Raum-Code eingeben!");
        const { error } = await tradingDb.from('market').upsert([{ room_id: name, price: 100, challenge_active: false }], { onConflict: 'room_id' });
        if(error) return alert(error.message);
        currentRoom = name;
        document.getElementById('room-setup').style.display = 'none';
        document.getElementById('active-controls').style.display = 'block';
        document.getElementById('active-room-display').innerText = name;
        initChart();
    }

    function toggleSimulation() {
        isSimRunning = !isSimRunning;
        document.getElementById('playPauseBtn').innerText = isSimRunning ? "⏸️ Stopp" : "▶️ Start";
        document.getElementById('playPauseBtn').style.background = isSimRunning ? "#64748b" : "#00802f";
        if(isSimRunning) runLoop();
    }

    async function runLoop() {
        if(!isSimRunning) return;
        price = +(price * (1 + (Math.random() - 0.5) * currentVola + currentTrend)).toFixed(2);
        updateDB();
        setTimeout(runLoop, 800);
    }

    async function updateDB() {
        await tradingDb.from('market').update({ price: price }).eq('room_id', currentRoom);
        document.getElementById('current-price').innerText = price.toFixed(2);
        priceHistory.push(price); timeLabels.push(timeLabels.length);
        if(priceHistory.length > 50) { priceHistory.shift(); timeLabels.shift(); }
        chart.update();
    }

    function setTrend(v, l) { currentTrend = v; document.getElementById('trend-label').innerText = l; }
    function triggerShock(f) { price *= f; updateDB(); }
    function adjustVola(d) { currentVola = Math.max(0.001, currentVola + d); document.getElementById('vola-display').innerText = (currentVola * 100).toFixed(1); }

    async function toggleChallenge() {
        isChallengeActive = !isChallengeActive;
        await tradingDb.from('market').update({ challenge_active: isChallengeActive }).eq('room_id', currentRoom);
        document.getElementById('toggleBtn').innerText = isChallengeActive ? "🔒 Challenge sperren" : "🔓 Challenge öffnen";
        document.getElementById('status-dot').className = isChallengeActive ? "status-dot online" : "status-dot waiting";
        document.getElementById('status-text').innerText = isChallengeActive ? "Aktiv" : "Bereit";
    }

        if(!confirm("
