<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Lehrer-Dashboard | HSG Trading</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="logo-container"><img src="HSG_Logo_DE_RGB.png" alt="HSG Logo"></div>
    <nav><span style="font-weight: bold; color: #00802f;">Markt-Zentrale</span></nav>
</header>

<div class="container">
    
    <section class="card" id="setup-section">
        <h3>1. Raum-Setup</h3>
        <div class="input-group">
            <input type="text" id="roomInput" placeholder="Raum-Code (z.B. KLASSE-101)">
            <button onclick="createAndJoinRoom()" class="btn-start">Raum öffnen</button>
        </div>
        <div id="room-status-display" class="status-bar" style="display:none; margin-top:10px;">
            <span id="status-dot" class="status-dot waiting"></span>
            <span id="status-text">Raum bereit</span>
        </div>
    </section>

    <div id="main-controls" style="display: none;">
        <section class="card">
            <h3>2. Marktverlauf</h3>
            <canvas id="chart" style="max-height: 300px;"></canvas>
            <div class="market-info" style="margin-top:15px;">
                <span>Kurs: <strong id="current-price">100.00</strong> CHF</span>
                <span>Trend: <span id="trend-label" style="font-weight:bold;">Neutral</span></span>
            </div>
        </section>

        <section class="card">
            <h3>3. Markt-Anpassungen</h3>
            <div class="strategy-grid">
                <div class="rule-card">
                    <h4>Schwankung (Vola)</h4>
                    <div style="font-size: 1.2em; font-weight: bold; margin: 10px 0;">
                        <span id="vola-display">1.2</span>%
                    </div>
                    <button onclick="adjustVola(0.001)" class="btn-start" style="width:45%">+</button>
                    <button onclick="adjustVola(-0.001)" class="btn-start" style="width:45%">-</button>
                </div>
                <div class="rule-card">
                    <h4>Trends</h4>
                    <button onclick="setTrend(0.007, 'Bull')" class="btn-start btn-block" style="background:#10b981; margin-bottom:5px;">📈 Bull</button>
                    <button onclick="setTrend(-0.007, 'Bear')" class="btn-start btn-block" style="background:#ef4444; margin-bottom:5px;">📉 Bear</button>
                    <button onclick="setTrend(0, 'Neutral')" class="btn-start btn-block" style="background:#64748b;">⚖️ Reset</button>
                </div>
                <div class="rule-card">
                    <h4>Schocks</h4>
                    <button onclick="triggerShock(1.10)" class="btn-start btn-block" style="background:#0ea5e9; margin-bottom:5px;">⚡ +10%</button>
                    <button onclick="triggerShock(0.90)" class="btn-start btn-block" style="background:#6366f1;">💥 -10%</button>
                </div>
            </div>
        </section>

        <div style="margin-top: 20px; display: flex; gap: 15px;">
            <button id="toggleBtn" onclick="toggleChallenge()" class="btn-start btn-block" style="background:#f59e0b; flex: 2; height: 50px;">
                🔓 Challenge für Schüler öffnen
            </button>
            <button onclick="resetEverything()" class="btn-start btn-block" style="background:#000; flex: 1;">
                🔄 Reset (Markt & Schüler)
            </button>
        </div>
        
        <button id="playPauseBtn" onclick="toggleSimulation()" class="btn-start btn-block" style="margin-top:10px; background:#00802f;">
            ▶️ Simulation Starten
        </button>
    </div>
</div>

<script>
    const S_URL = 'https://tzatuzzwdvkayowffbxy.supabase.co';
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR6YXR1enp3ZHZrYXlvd2ZmYnh5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NTI1NDcsImV4cCI6MjA4ODEyODU0N30.cz5jRfhlOGs9OhFeIfdORPjDljcysI_6db3ny9fLRE4'; 
    const tradingDb = supabase.createClient(S_URL, S_KEY);

    let currentRoom = "", price = 100, isSimRunning = false, isChallengeActive = false;
    let currentTrend = 0, currentVola = 0.012;
    let priceHistory = [100], timeLabels = [0], chart;

    function initChart() {
        const ctx = document.getElementById('chart').getContext('2d');
        chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: timeLabels,
                datasets: [{
                    label: 'Preis',
                    data: priceHistory,
                    borderColor: '#00802f',
                    borderWidth: 2,
                    tension: 0.3,
                    pointRadius: 0,
                    fill: false
                }]
            },
            options: { responsive: true, animation: false, scales: { y: { beginAtZero: false } } }
        });
    }

    async function createAndJoinRoom() {
        const name = document.getElementById('roomInput').value.trim().toUpperCase();
        if(!name) return alert("Bitte Code eingeben!");
        
        const { error } = await tradingDb.from('market').upsert([{ room_id: name, price: 100, challenge_active: false }], { onConflict: 'room_id' });
        if(error) return alert("Fehler: " + error.message);

        currentRoom = name;
        document.getElementById('room-status-display').style.display = 'flex';
        document.getElementById('active-room-display'); // Placeholder falls nötig
        document.getElementById('main-controls').style.display = 'block';
        initChart();
    }

    function adjustVola(d) { currentVola = Math.max(0, currentVola + d); document.getElementById('vola-display').innerText = (currentVola * 100).toFixed(1); }
    function setTrend(v, l) { currentTrend = v; document.getElementById('trend-label').innerText = l; }
    function triggerShock(f) { price *= f; updateDB(); }

    function toggleSimulation() {
        isSimRunning = !isSimRunning;
        document.getElementById('playPauseBtn').innerText = isSimRunning ? "⏸️ Pause" : "▶️ Simulation Fortsetzen";
        if(isSimRunning) runLoop();
    }

    async function runLoop() {
        if(!isSimRunning) return;
        price = +(price * (1 + (Math.random() - 0.5) * currentVola + currentTrend)).toFixed(2);
        updateDB();
        setTimeout(runLoop, 800);
    }

    async function updateDB() {
        await tradingDb.from('market').update({ price: price }).eq('room_id', currentRoom);
        document.getElementById('current-price').innerText = price.toFixed(2);
        priceHistory.push(price);
        timeLabels.push(timeLabels.length);
        if(priceHistory.length > 50) { priceHistory.shift(); timeLabels.shift(); }
        chart.update();
    }

    async function toggleChallenge() {
        isChallengeActive = !isChallengeActive;
        await tradingDb.from('market').update({ challenge_active: isChallengeActive }).eq('room_id', currentRoom);
        document.getElementById('toggleBtn').innerText = isChallengeActive ? "🔒 Raum sperren" : "🔓 Raum öffnen";
        document.getElementById('status-dot').className = isChallengeActive ? "status-dot online" : "status-dot waiting";
    }

    async function resetEverything() {
        if(!confirm("Alles zurücksetzen?")) return;
        price = 100;
        priceHistory = [100];
        timeLabels = [0];
        await tradingDb.from('market').update({ price: 100 }).eq('room_id', currentRoom);
        await tradingDb.from('leaderboard').update({ score: 1000 }).eq('room_id', currentRoom);
        chart.update();
        alert("Reset durchgeführt!");
    }
</script>
</body>
</html>
