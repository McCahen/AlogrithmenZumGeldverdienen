<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Lehrer-Dashboard | Challenge Steuerung</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-card { max-width: 600px; margin: 40px auto; padding: 20px; border: 2px solid #006b4d; border-radius: 12px; }
        .room-setup { margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid #e2e8f0; }
        .controls { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        .status-badge { padding: 5px 10px; border-radius: 20px; font-size: 0.8em; font-weight: bold; }
        .active { background: #dcfce7; color: #166534; }
        .inactive { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>

<div class="container">
    <div class="admin-card">
        <h1>👨‍🏫 Lehrer-Konsole</h1>
        
        <div class="room-setup">
            <h3>1. Raum erstellen</h3>
            <div class="input-group">
                <input type="text" id="roomInput" placeholder="z.B. KLASSE-4A" style="width: 70%;">
                <button onclick="createAndJoinRoom()" class="btn-start">Raum erstellen</button>
            </div>
            <p id="room-status" style="font-size: 0.85em; color: #64748b; margin-top: 10px;">Kein Raum aktiv.</p>
        </div>

        <div id="room-controls" style="display: none;">
            <h3>2. Challenge Steuerung: <span id="active-room-display" style="color:#006b4d;">-</span></h3>
            <div class="market-info">
                Aktueller Preis: <strong id="current-price">100.00</strong> CHF
            </div>
            
            <div class="controls">
                <button id="toggleBtn" onclick="toggleChallenge()" class="btn-start" style="background: #f59e0b;">🔓 Challenge freigeben</button>
                <button onclick="resetChallenge()" class="btn-start" style="background: #ef4444;">🔄 Reset (Alle raus)</button>
            </div>
        </div>
    </div>
</div>

<script>
    const S_URL = 'https://tzatuzzwdvkayowffbxy.supabase.co';
    const S_KEY = 'YOUR_SUPABASE_KEY'; // Nutze deinen Key
    const tradingDb = supabase.createClient(S_URL, S_KEY);

    let currentRoom = "";
    let isChallengeActive = false;
    let price = 100;
    let loopTimeout;

    // --- RAUM ERSTELLEN ---
    async function createAndJoinRoom() {
        const roomName = document.getElementById('roomInput').value.trim().toUpperCase();
        if (!roomName) return alert("Bitte Raumnamen eingeben!");

        // In Supabase prüfen, ob Raum existiert oder neu anlegen
        const { data, error } = await tradingDb
            .from('market')
            .upsert([{ 
                room_id: roomName, 
                price: 100, 
                challenge_active: false 
            }], { onConflict: 'room_id' })
            .select();

        if (error) {
            alert("Fehler beim Erstellen: " + error.message);
        } else {
            currentRoom = roomName;
            document.getElementById('room-status').innerText = "✅ Raum '" + roomName + "' ist bereit.";
            document.getElementById('active-room-display').innerText = roomName;
            document.getElementById('room-controls').style.display = 'block';
            startPriceLoop();
        }
    }

    // --- PREIS-LOOP (Nur für diesen Raum) ---
    async function startPriceLoop() {
        if (!currentRoom) return;

        // Preis leicht schwanken lassen
        let change = price * (Math.random() - 0.5) * 0.02;
        price = +(price + change).toFixed(2);
        if (price < 10) price = 10;

        // Update in DB für diesen spezifischen Raum
        await tradingDb.from('market')
            .update({ price: price })
            .eq('room_id', currentRoom);

        document.getElementById('current-price').innerText = price.toFixed(2);
        
        loopTimeout = setTimeout(startPriceLoop, 800);
    }

    // --- FREIGABE STEUERN ---
    async function toggleChallenge() {
        isChallengeActive = !isChallengeActive;
        const btn = document.getElementById('toggleBtn');

        await tradingDb.from('market')
            .update({ challenge_active: isChallengeActive })
            .eq('room_id', currentRoom);

        if (isChallengeActive) {
            btn.innerText = "🔒 Challenge sperren";
            btn.style.background = "#64748b";
        } else {
            btn.innerText = "🔓 Challenge freigeben";
            btn.style.background = "#f59e0b";
        }
    }

    // --- RESET ---
    async function resetChallenge() {
        if (!confirm("Alle Schüler aus diesem Raum werfen?")) return;
        
        await tradingDb.from('market')
            .update({ price: -1, challenge_active: false })
            .eq('room_id', currentRoom);
        
        location.reload(); // Lehrer-Seite auch neu laden
    }
</script>
</body>
</html>
