<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>🕹️ Markt-Konsole Pro | Live-Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
    <script src="charts.js"></script> <style>
        .admin-container { max-width: 1200px; margin: 0 auto; padding: 10px 20px; }
        /* Kompaktes 3-Spalten-Grid */
        .dashboard-layout { 
            display: grid; 
            grid-template-columns: 220px 1fr 220px; 
            gap: 15px; 
            max-height: 400px; 
        }
        .price-hero { font-size: 2.5em; font-weight: bold; color: #006b4d; margin: 5px 0; }
        .trend-active { background-color: #006b4d !important; color: white !important; border: 1px solid #004d37 !important; }
        .btn-small { padding: 6px; font-size: 0.8em; width: 100%; margin: 3px 0; cursor: pointer; border-radius: 4px; border: 1px solid #cbd5e1; background: #f1f5f9; }
        canvas { background: #ffffff; border-radius: 8px; border: 1px solid #e2e8f0; width: 100% !important; height: 220px !important; }
        h3 { margin: 0 0 8px 0; font-size: 0.9em; color: #64748b; text-transform: uppercase; }
        .rule-card { padding: 12px; height: 100%; display: flex; flex-direction: column; justify-content: space-between; }
    </style>
</head>

<body>
    <header style="padding: 8px 5%;">
        <div class="logo-container">
            <img src="HSG_Logo_DE_RGB.png" alt="HSG Logo" style="height: 30px;">
        </div>
        <div style="font-weight: bold; color: #006b4d; font-size: 0.9em;">MARKTPRÄSIDENT / ADMIN</div>
    </header>

    <div class="admin-container">
        <div class="dashboard-layout">
            
            <div class="rule-card">
                <div>
                    <h3>📡 Markt-Status</h3>
                    <div id="statusInfo" style="font-size: 0.75em; font-weight: bold;">STANDBY</div>
                    <div class="price-hero" id="priceLabel">100.00</div>
                    <button id="masterAction" class="btn-start" style="padding: 10px;" onclick="toggleMarket()">▶ Markt Starten</button>
                </div>
                <div style="margin-top: 10px; border-top: 1px solid #eee; padding-top: 8px;">
                    <h3>⚙️ Vola: <span id="volLabel">1.5</span>%</h3>
                    <div style="display: flex; gap: 4px;">
                        <button class="btn-small" onclick="adjustVol(-0.5)">-</button>
                        <button class="btn-small" onclick="adjustVol(0.5)">+</button>
                    </div>
                </div>
            </div>

            <div class="rule-card">
                <h3>📈 Live-Kursverlauf</h3>
                <canvas id="chart"></canvas>
            </div>

            <div class="rule-card">
                <div>
                    <h3>🚀 Trendsteuerung</h3>
                    <button class="btn-small" id="btn-bull" onclick="setTrend('bull')">🚀 Bull (+)</button>
                    <button class="btn-small trend-active" id="btn-sideways" onclick="setTrend('sideways')">↔ Neutral</button>
                    <button class="btn-small" id="btn-bear" onclick="setTrend('bear')">📉 Bear (-)</button>
                </div>
                <div style="margin-top: 8px; border-top: 1px solid #eee; padding-top: 8px;">
                    <h3>🛠 System</h3>
                    <button class="btn-small" style="background:#fee2e2; color:#991b1b;" onclick="triggerSpike(-5)">Crash -5%</button>
                    <button id="challengeToggleBtn" class="btn-small" style="background: #d97706; color:white;" onclick="toggleChallenge()">🔓 Challenge</button>
                    <button onclick="fullReset()" style="background:none; border:none; color:#ef4444; font-size:0.65em; cursor:pointer; width:100%; margin-top:4px;">⚠️ Reset System</button>
                </div>
            </div>

        </div>
    </div>

    <script>
        const S_URL = 'https://tzatuzzwdvkayowffbxy.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR6YXR1enp3ZHZrYXlvd2ZmYnh5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NTI1NDcsImV4cCI6MjA4ODEyODU0N30.cz5jRfhlOGs9OhFeIfdORPjDljcysI_6db3ny9fLRE4';
        const db = supabase.createClient(S_URL, S_KEY);
        
        // Diese Variablen nutzt charts.js
        let price = 100.00; 
        let history = [100.00]; 
        let portfolioHistory = []; // Bleibt leer, drawChart() sollte das händeln

        let activeTrend = 'sideways', volatility = 1.5, marketActive = false, tickerId = null, challengeActive = false;

        function toggleMarket() {
            const btn = document.getElementById('masterAction');
            const status = document.getElementById('statusInfo');
            marketActive = !marketActive;
            
            if (marketActive) {
                btn.innerText = "⏹ Stopp";
                btn.classList.add('running');
                status.innerText = "STATUS: LIVE";
                status.style.color = "#22c55e";
                tickerId = setInterval(executeTick, 500);
            } else {
                btn.innerText = "▶ Markt Starten";
                btn.classList.remove('running');
                status.innerText = "STATUS: STANDBY";
                status.style.color = "#94a3b8";
                clearInterval(tickerId);
            }
        }

        async function executeTick() {
            let changePercent = (Math.random() - 0.5) * (volatility / 100);
            if (activeTrend === 'bull') changePercent += 0.005; 
            if (activeTrend === 'bear') changePercent -= 0.006; 
            
            price = Math.max(0.5, +(price * (1 + changePercent)).toFixed(2));
            history.push(price);
            if(history.length > 50) history.shift();
            
            updateUI();
        }

        async function updateUI() {
            document.getElementById('priceLabel').innerText = price.toFixed(2);
            if (typeof drawChart === "function") drawChart(); 
            await db.from('market').update({ price: price }).eq('id', 1);
        }

        function setTrend(t) {
            activeTrend = t;
            document.querySelectorAll('#btn-bull, #btn-sideways, #btn-bear').forEach(b => b.classList.remove('trend-active'));
            document.getElementById('btn-' + t).classList.add('trend-active');
        }

        async function triggerSpike(percent) {
            if (!marketActive) return;
            price = Math.max(0.5, +(price * (1 + percent/100)).toFixed(2));
            updateUI();
        }

        function adjustVol(val) {
            volatility = Math.max(0.1, +(volatility + val).toFixed(1));
            document.getElementById('volLabel').innerText = volatility.toFixed(1);
        }

        async function toggleChallenge() {
            challengeActive = !challengeActive;
            const btn = document.getElementById('challengeToggleBtn');
            await db.from('market').update({ challenge_active: challengeActive }).eq('id', 1);
            btn.innerText = challengeActive ? "🔒 Sperren" : "🔓 Challenge";
            btn.style.background = challengeActive ? "#ef4444" : "#d97706";
        }

        async function fullReset() {
            if (!confirm("System-Reset?")) return;
            price = 100.00; history = [100.00];
            await db.from('market').update({ price: -1 }).eq('id', 1);
            await db.from('leaderboard').delete().neq('name', '---');
            updateUI();
        }

        window.onload = () => { if (typeof drawChart === "function") drawChart(); };
    </script>
</body>
</html>
