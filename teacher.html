<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>🕹️ Markt-Konsole | Lehrer-Ansicht</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #f8fafc; margin: 0; padding: 40px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .header { text-align: center; margin-bottom: 30px; }
        h1 { font-size: 2.5em; color: #38bdf8; margin: 0; text-transform: uppercase; letter-spacing: 3px; }
        .console-card { background: #1e293b; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 500px; text-align: center; }
        .price-display { font-size: 5em; font-family: 'Courier New', monospace; font-weight: bold; color: #2ecc71; margin: 10px 0; text-shadow: 0 0 15px rgba(46, 204, 113, 0.3); }
        .main-btn { width: 100%; padding: 20px; font-size: 1.2em; font-weight: bold; border: none; border-radius: 12px; cursor: pointer; transition: all 0.3s; margin-bottom: 25px; text-transform: uppercase; }
        .btn-start { background: #22c55e; color: white; box-shadow: 0 4px 14px rgba(34, 197, 94, 0.4); }
        .btn-stop { background: #ef4444; color: white; box-shadow: 0 4px 14px rgba(239, 68, 68, 0.4); }
        .trend-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 30px; }
        .trend-btn { background: #334155; border: 1px solid #475569; color: white; padding: 15px 5px; border-radius: 12px; cursor: pointer; font-size: 1em; transition: 0.2s; }
        .trend-btn.active { background: #38bdf8; border-color: #0ea5e9; font-weight: bold; transform: scale(1.05); }
        .status-text { color: #94a3b8; font-size: 0.9em; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
        .reset-link { color: #64748b; background: none; border: none; cursor: pointer; text-decoration: underline; font-size: 0.8em; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Markt-Steuerung</h1>
    </div>

    <div class="console-card">
        <div id="statusInfo" class="status-text">Status: Angehalten</div>
        <div class="price-display" id="priceLabel">100.00</div>

        <button id="masterAction" class="main-btn btn-start" onclick="toggleMarket()">▶ Markt Starten</button>

        <div class="trend-grid">
            <button id="btn-bull" class="trend-btn" onclick="setTrend('bull')">🚀 Bull</button>
            <button id="btn-sideways" class="trend-btn active" onclick="setTrend('sideways')">↔ Neutral</button>
            <button id="btn-bear" class="trend-btn" onclick="setTrend('bear')">📉 Bear</button>
        </div>

        <button class="reset-link" onclick="fullReset()">Leaderboard & Markt zurücksetzen</button>
    </div>

    <script>
        // --- INITIALISIERUNG ---
        const S_URL = 'https://tzatuzzwdvkayowffbxy.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR6YXR1enp3ZHZrYXlvd2ZmYnh5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NTI1NDcsImV4cCI6MjA4ODEyODU0N30.cz5jRfhlOGs9OhFeIfdORPjDljcysI_6db3ny9fLRE4';
        const db = supabase.createClient(S_URL, S_KEY);

         let currentPrice = 100.00;
        let activeTrend = 'sideways';
        let marketActive = false;
        let tickerId = null;

        function toggleMarket() {
            const btn = document.getElementById('masterAction');
            const status = document.getElementById('statusInfo');

            if (!marketActive) {
                marketActive = true;
                btn.innerText = "⏸ Markt Stoppen";
                btn.className = "main-btn btn-stop";
                status.innerText = "Status: Live am Markt";
                status.style.color = "#22c55e";
                tickerId = setInterval(executeTick, 1500);
            } else {
                stopMarket();
            }
        }

        function stopMarket() {
            marketActive = false;
            const btn = document.getElementById('masterAction');
            const status = document.getElementById('statusInfo');
            if(btn) {
                btn.innerText = "▶ Markt Starten";
                btn.className = "main-btn btn-start";
            }
            if(status) {
                status.innerText = "Status: Angehalten";
                status.style.color = "#94a3b8";
            }
            clearInterval(tickerId);
        }

        async function executeTick() {
            let delta = (Math.random() - 0.5) * 1.3;
            if (activeTrend === 'bull') delta += 1.4;
            if (activeTrend === 'bear') delta -= 1.6;

            currentPrice = Math.max(1, +(currentPrice + delta).toFixed(2));
            
            const label = document.getElementById('priceLabel');
            if(label) label.innerText = currentPrice.toFixed(2);

            await db.from('market').update({ price: currentPrice }).eq('id', 1);
        }

        function setTrend(t) {
            activeTrend = t;
            document.querySelectorAll('.trend-btn').forEach(b => b.classList.remove('active'));
            const activeBtn = document.getElementById('btn-' + t);
            if(activeBtn) activeBtn.classList.add('active');
        }

        async function fullReset() {
            if (!confirm("Wirklich ALLES zurücksetzen?")) return;
            
            // 1. Markt sofort stoppen
            stopMarket();
            
            // 2. Werte zurücksetzen
            currentPrice = 100.00;
            activeTrend = 'sideways';
            setTrend('sideways');
            
            const label = document.getElementById('priceLabel');
            if(label) label.innerText = "100.00";

            try {
                // 3. Datenbank bereinigen
                await db.from('leaderboard').delete().neq('name', '---');
                await db.from('market').update({ price: 100.00 }).eq('id', 1);
                alert("Reset erfolgreich!");
            } catch (err) {
                console.error("Fehler beim Reset:", err);
            }
        }
    </script>
</body>
</html>
