<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Lehrer-Dashboard | Challenge Steuerung</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
    </head>
<body>

<header>
    <div class="logo-container">
        <img src="HSG_Logo_DE_RGB.png" alt="HSG Logo">
    </div>
    <nav>
        <span style="font-weight: bold; color: #006b4d;">Lehrer-Modus</span>
    </nav>
</header>

<div class="container">
    <div class="setup-container">
        <div class="card" id="setup-box">
            <h2>👨‍🏫 Lehrer-Konsole</h2>
            <div class="status-bar">
                <span id="status-dot" class="status-dot"></span>
                <span id="room-status-text">Kein Raum aktiv</span>
            </div>
            
            <input type="text" id="roomInput" placeholder="Raum-Name (z.B. KLASSE-101)">
            <button onclick="createAndJoinRoom()" class="btn-start btn-block">Raum erstellen / beitreten</button>
        </div>

        <div class="card" id="room-controls" style="display:none; margin-top:20px;">
            <h3>Raum: <span id="active-room-display" class="room-display">-</span></h3>
            
            <div class="market-info" style="justify-content: center; margin: 20px 0;">
                <div>Aktueller Preis: <strong id="current-price">100.00</strong> CHF</div>
            </div>
            
            <div class="admin-controls">
                <button id="toggleBtn" onclick="toggleChallenge()" class="btn-start btn-block" style="background:#f59e0b;">
                    🔓 Challenge freigeben
                </button>
                
                <button onclick="resetChallenge()" class="btn-start btn-block" style="background:#ef4444; padding: 10px;">
                    🔄 Reset (Alle rauswerfen)
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    // Konfiguration - Nutze deine echten Keys
    const S_URL = 'https://tzatuzzwdvkayowffbxy.supabase.co';
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR6YXR1enp3ZHZrYXlvd2ZmYnh5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NTI1NDcsImV4cCI6MjA4ODEyODU0N30.cz5jRfhlOGs9OhFeIfdORPjDljcysI_6db3ny9fLRE4'; 
    const tradingDb = supabase.createClient(S_URL, S_KEY);

    let currentRoom = "";
    let isChallengeActive = false;
    let price = 100;
    let loopTimeout;

    async function createAndJoinRoom() {
        const roomInput = document.getElementById('roomInput');
        const roomName = roomInput.value.trim().toUpperCase();
        
        if (!roomName) return alert("Bitte Raumnamen eingeben!");

        // Upsert erstellt den Raum oder aktualisiert ihn, falls er existiert
        const { data, error } = await tradingDb
            .from('market')
            .upsert([{ 
                room_id: roomName, 
                price: 100, 
                challenge_active: false 
            }], { onConflict: 'room_id' })
            .select();

        if (error) {
            alert("Fehler: " + error.message);
        } else {
            currentRoom = roomName;
            
            // UI Update
            document.getElementById('setup-box').style.display = 'none';
            document.getElementById('room-controls').style.display = 'block';
            document.getElementById('active-room-display').innerText = roomName;
            
            const dot = document.getElementById('status-dot');
            dot.className = 'status-dot waiting';
            document.getElementById('room-status-text').innerText = "Raum aktiv: " + roomName;

            startPriceLoop();
        }
    }

    async function startPriceLoop() {
        if (!currentRoom) return;

        // Volatilität berechnen
        let change = price * (Math.random() - 0.5) * 0.02;
        price = +(price + change).toFixed(2);
        if (price < 10) price = 10;

        // Update in DB
        await tradingDb.from('market')
            .update({ price: price })
            .eq('room_id', currentRoom);

        document.getElementById('current-price').innerText = price.toFixed(2);
        
        loopTimeout = setTimeout(startPriceLoop, 800);
    }

    async function toggleChallenge() {
        isChallengeActive = !isChallengeActive;
        const btn = document.getElementById('toggleBtn');
        const dot = document.getElementById('status-dot');

        await tradingDb.from('market')
            .update({ challenge_active: isChallengeActive })
            .eq('room_id', currentRoom);

        if (isChallengeActive) {
            btn.innerText = "🔒 Challenge sperren";
            btn.style.background = "#64748b";
            dot.className = "status-dot online";
        } else {
            btn.innerText = "🔓 Challenge freigeben";
            btn.style.background = "#f59e0b";
            dot.className = "status-dot waiting";
        }
    }

    async function resetChallenge() {
        if (!confirm("Dies wird alle Schüler in diesem Raum trennen. Fortfahren?")) return;
        
        await tradingDb.from('market')
            .update({ price: -1, challenge_active: false })
            .eq('room_id', currentRoom);
        
        location.reload();
    }
</script>
</body>
</html>
