<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Algo-Workshop: Trends kontern</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo-container">
            <a href="home.html">
                <img src="HSG_Logo_DE_RGB.png" alt="HSG Logo">
            </a>
        </div>
        
        <nav>
            <a href="statisch.html">Statisch</a>
            <a href="trend.html">Trend</a>
            <a href="konter-trend.html" class="active">Konter-Trend</a>
            <a href="kombiniert.html">Kombiniert</a>
        </nav>
    </header> 
    
<div class="container">
    <h2>🚀 Ein erster Versuch: Tief kaufen, hoch verkaufen</h2>
    
    <div class="market-info">
        <div>Aktueller Kurs: <strong id="price">100</strong></div>
        <div>Depotwert: <strong id="total">1000</strong></div>
    </div>

    <div class="controls">
        <h3>Strategie-Logik:</h3>
        <p>
            Wenn der Preis unter <input type="number" id="buyTrigger" value="95">  ist, dann <b style="color:#0284c7">KAUFEN</b> (1 Stück)<br>
            Wenn der Preis über   <input type="number" id="sellTrigger" value="105">  ist, dann <b style="color:#ef4444">VERKAUFEN</b> (1 Stück)
        </p>
        <button onclick="toggleSimulation()" id="startBtn">Simulation Starten</button>
    </div>

    <canvas id="chart"></canvas>

    <div class="footer-stats">
        <span>Cash: <b id="cash">1000.00</b> €</span>
        <span>Aktienwert: <b id="sharesValue">0.00</b> €</span>
        <span>Besitz: <b id="shares">0</b> Stück</span>
    </div>
</div>

<script>
    let price = 100;
    let cash = 1000;
    let shares = 0;
    let isRunning = false;
    let history = [100];
    let portfolioHistory = [1000]; // Startwert des Depots

    function toggleSimulation() {
        isRunning = !isRunning;
        document.getElementById('startBtn').innerText = isRunning ? "Stoppen" : "Simulation Starten";
        if(isRunning) runStep();
    }

    function runStep() {
        if(!isRunning) return;

        // 1. Markt simuliere (Zufallsbewegung)
        let change = (Math.random() - 0.5) * 4;
        price = Math.max(10, +(price + change).toFixed(2));
        history.push(price);

        // 2. Algorithmus-Logik auslesen
        let buyAt = parseFloat(document.getElementById('buyTrigger').value);
        let sellAt = parseFloat(document.getElementById('sellTrigger').value);

        // 3. Entscheidung treffen
        if (price <= buyAt && cash >= price) {
            cash -= price;
            shares++;
            console.log("Kauf bei " + price);
        } else if (price >= sellAt && shares > 0) {
            cash += price;
            shares--;
            console.log("Verkauf bei " + price);
        }

        let totalValue = +(cash + shares * price).toFixed(2);
        portfolioHistory.push(totalValue);
        if(portfolioHistory.length > 50) portfolioHistory.shift(); // Limitieren auf 50 Datenpunkte
        
        updateUI(totalValue);
        setTimeout(runStep, 500); // Alle 0.5 Sek ein Tick
    }

    function updateUI(total) {
        document.getElementById('price').innerText = price.toFixed(2) + " €";
        document.getElementById('cash').innerText = cash.toFixed(2);
        document.getElementById('shares').innerText = shares;
        document.getElementById('sharesValue').innerText = (shares * price).toFixed(2);
        document.getElementById('total').innerText = total.toFixed(2) + " €";
        drawChart();
    }

    function drawChart() {
        const canvas = document.getElementById('chart'), ctx = canvas.getContext('2d');
        canvas.width = canvas.offsetWidth; canvas.height = 240;
        const padding = 50, w = canvas.width - padding * 2, h = canvas.height - padding * 2;
        ctx.clearRect(0,0,canvas.width, canvas.height);
        
        const minP = Math.min(...history) * 0.98, maxP = Math.max(...history) * 1.02;
        const minPort = Math.min(...portfolioHistory) * 0.98, maxPort = Math.max(...portfolioHistory) * 1.02;

        const getX = (i) => padding + (i / 49) * w;
        const getYPrice = (v) => canvas.height - padding - ((v - minP) / (maxP - minP)) * h;
        const getYPort = (v) => canvas.height - padding - ((v - minPort) / (maxPort - minPort)) * h;

        // Achsen & Beschriftung
        ctx.strokeStyle = "#e2e8f0"; ctx.beginPath(); ctx.moveTo(padding, padding); ctx.lineTo(padding, canvas.height-padding); ctx.lineTo(canvas.width-padding, canvas.height-padding); ctx.stroke();
        
        ctx.fillStyle = "#94a3b8"; ctx.font = "10px sans-serif";
        ctx.fillText("ZEIT (TICKS)", canvas.width/2 - 20, canvas.height - 15);

        // Preis (Grau gestrichelt)
        ctx.setLineDash([5, 5]); ctx.strokeStyle = "#94a3b8"; ctx.beginPath();
        history.forEach((v, i) => i === 0 ? ctx.moveTo(getX(i), getYPrice(v)) : ctx.lineTo(getX(i), getYPrice(v))); ctx.stroke();

        // Portfolio (Blau fett)
        ctx.setLineDash([]); ctx.strokeStyle = "#0284c7"; ctx.lineWidth = 3; ctx.beginPath();
        portfolioHistory.forEach((v, i) => i === 0 ? ctx.moveTo(getX(i), getYPort(v)) : ctx.lineTo(getX(i), getYPort(v))); ctx.stroke();
    }
</script>
</body>
</html>
