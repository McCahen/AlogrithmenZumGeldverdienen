<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Algo-Trader Workshop</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f1f5f9; padding: 20px; color: #1e293b; }
        .container { max-width: 850px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        nav { margin-bottom: 20px; padding: 10px; background: #fff; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        nav a { margin-right: 15px; text-decoration: none; color: #0284c7; font-weight: bold; }
        .market-info { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; padding: 20px; background: #f8fafc; border-radius: 12px; border: 1px solid #e2e8f0; }
        .market-info div { font-size: 0.9em; color: #64748b; text-transform: uppercase; }
        .market-info strong { display: block; font-size: 1.8em; color: #0f172a; margin-top: 5px; }
        .controls { background: #f1f5f9; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        button { cursor: pointer; background: #10b981; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-weight: bold; font-size: 1em; width: 100%; transition: 0.2s; }
        button:hover { background: #059669; }
        input { padding: 8px; width: 60px; border-radius: 6px; border: 1px solid #cbd5e1; text-align: center; font-weight: bold; color: #0284c7; }
        canvas { background: #fff; border-radius: 10px; border: 1px solid #e2e8f0; margin-top: 15px; width: 100%; }
        .footer-stats { display: flex; justify-content: space-between; margin-top: 15px; font-size: 0.9em; color: #64748b; border-top: 1px solid #f1f5f9; padding-top: 15px; }
        .footer-stats b { color: #1e293b; }
    </style>
</head>
<body>
    
<nav>
    <a href="home.html">🏠 Home</a>
    <a href="statisch.html">📊 Statisch</a>
    <a href="trend.html">📈 Trend</a>
    <a href="konter-trend.html">📉 Konter-Trend</a>
    <a href="kombiniert.html">🧬 Kombiniert</a>
</nav>
</br>
    
<div class="container">
    <h2>🚀 Ein erster Versuch: Tief kaufen, hoch verkaufen</h2>
    
    <div class="market-info">
        <div>Aktueller Kurs: <strong id="price">100</strong> €</div>
        <div>Depotwert: <strong id="total">1000</strong> €</div>
    </div>

    <div class="controls">
        <h3>Strategie-Logik:</h3>
        <p>
            WENN Preis UNTER <input type="number" id="buyTrigger" value="95"> € DANN <strong>KAUFEN</strong> (1 Stück)<br>
            WENN Preis ÜBER <input type="number" id="sellTrigger" value="105"> € DANN <strong>VERKAUFEN</strong> (1 Stück)
        </p>
        <button onclick="toggleSimulation()" id="startBtn">Simulation Starten</button>
    </div>

    <div style="margin-top: 20px;">
        <p>Guthaben: <span id="cash">1000</span> € | Aktien im Besitz: <span id="shares">0</span></p>
        <canvas id="chart" width="760" height="200" style="border:1px solid #ccc;"></canvas>
    </div>
</div>

<script>
    let price = 100;
    let cash = 1000;
    let shares = 0;
    let isRunning = false;
    let history = [100];

    function toggleSimulation() {
        isRunning = !isRunning;
        document.getElementById('startBtn').innerText = isRunning ? "Stoppen" : "Simulation Starten";
        if(isRunning) runStep();
    }

    function runStep() {
        if(!isRunning) return;

        // 1. Markt simuliere (Zufallsbewegung)
        let change = (Math.random() - 0.5) * 4;
        price = Math.max(10, +(price + change).toFixed(2));
        history.push(price);

        // 2. Algorithmus-Logik auslesen
        let buyAt = parseFloat(document.getElementById('buyTrigger').value);
        let sellAt = parseFloat(document.getElementById('sellTrigger').value);

        // 3. Entscheidung treffen
        if (price <= buyAt && cash >= price) {
            cash -= price;
            shares++;
            console.log("Kauf bei " + price);
        } else if (price >= sellAt && shares > 0) {
            cash += price;
            shares--;
            console.log("Verkauf bei " + price);
        }

        updateUI();
        setTimeout(runStep, 500); // Alle 0.5 Sek ein Tick
    }

    function updateUI() {
        document.getElementById('price').innerText = price.toFixed(2);
        document.getElementById('cash').innerText = cash.toFixed(2);
        document.getElementById('shares').innerText = shares;
        let total = cash + (shares * price);
        document.getElementById('total').innerText = total.toFixed(2);
        drawChart();
    }

    function drawChart() {
        const canvas = document.getElementById('chart');
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.beginPath();
        ctx.moveTo(0, canvas.height - history[0]);
        for(let i=1; i<history.length; i++) {
            let x = (i / history.length) * canvas.width;
            let y = canvas.height - (history[i] - 50) * 2; // Skalierung
            ctx.lineTo(x, y);
        }
        ctx.stroke();
    }
</script>
</body>
</html>
